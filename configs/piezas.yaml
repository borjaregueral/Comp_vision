# ============================================================================
# piezas.yaml — Catálogo de precios de piezas (top 20 siniestrables)
# ============================================================================
# IMPORTANTE: PRECIOS PLACEHOLDER orientativos basados en rangos públicos
# (recambios online, catálogos OEM 2024-2025). Sustituir por:
#   1. Catálogo de la aseguradora si lo hay.
#   2. Conexión a API de proveedor (Audatex, GT Motive, DAT Iberia).
#   3. Negociación con red de recambistas.
#
# Estructura por nivel:
#   marca → modelo → (familia_pieza, año_rango) → { oem_eur, aftermarket_eur, tech, notes }
#
# Si una pieza no está catalogada → el estimador genera alerta y deriva a ámbar.
# ============================================================================

