# ── Política de selección OEM vs aftermarket ───────────────────────────────
# Reglas que el estimador aplica al elegir precio:
selection_policy:
  default: aftermarket            # Por defecto, aftermarket si disponible
  use_oem_if:
    - "vehicle_age_years <= 3"   # Vehículos nuevos: OEM por garantía
    - "vehicle_value > 30000"    # Vehículos premium
    - "part.tech in ['xenon', 'led', 'matrix']"   # Faros tech: solo OEM
    - "part.aftermarket_eur is null"               # Pieza sin alternativa

# ── Piezas no catalogadas ──────────────────────────────────────────────────
# Si el modelo detecta sustitución necesaria en una combinación marca-modelo-
# pieza-año no listada, el estimador:
#   1. Genera alerta de tipo "warning" con id "parts_lookup_missing".
#   2. Aplica un precio orientativo por defecto desde fallback_prices.
#   3. Marca el caso como ámbar (no puede ir a verde sin precio fiable).
fallback_prices:
  front_bumper: 400
  back_bumper: 360
  front_left_door: 600
  front_right_door: 600
  back_left_door: 560
  back_right_door: 560
  front_left_light: 350
  front_right_light: 350
  back_left_light: 200
  back_right_light: 200
  left_mirror: 175
  right_mirror: 175
  hood: 480
  trunk: 450
  tailgate: 520
  wheel: 280
